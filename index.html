<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="google-site-verification"
      content="OdSmyWt2B13VKOqg6pNZe4hsqMpVfQKqtuvYWKzV3DY"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gán Sản Phẩm YouTube Shopee</title>
    <link rel="stylesheet" href="trangchu.css" />
  </head>

  <body>
    <div class="container">
      <h1 class="title">Hệ Thống YouTube Shopee</h1>

      <a class="zalo-btn" href="https://zalo.me/g/your-link">
        💬 THAM GIA NHÓM ZALO
      </a>

      <div class="card">
        <label for="shopee-url">Dán link Shopee vào đây:</label>
        <input
          type="text"
          id="shopee-url"
          placeholder="https://shopee.vn/product-name..."
        />

        <button class="submit-btn" id="btn-gan-ma">⚡ Gán sản phẩm ngay</button>
      </div>

      <div
        id="status-msg"
        style="margin-top: 15px; font-weight: bold; text-align: center"
      ></div>
    </div>

    <script>
      const btn = document.getElementById("btn-gan-ma");
      const input = document.getElementById("shopee-url");
      const status = document.getElementById("status-msg");

      btn.addEventListener("click", async () => {
        const link = input.value;

        if (!link) {
          status.innerText = "❌ Vui lòng dán link Shopee!";
          status.style.color = "red";
          return;
        }

        status.innerText = "⏳ Đang kết nối server và gán sản phẩm...";
        status.style.color = "#ff9800";

        try {
          // Gửi yêu cầu đến Server Node.js chạy tại cổng 3000
          const response = await fetch("https://webshope.onrender.com/api/gan-ma", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ link: link }),
          });

          const result = await response.json();

          if (result.success) {
            status.innerText =
              "✅ Thành công! Sản phẩm đã được đẩy lên Merchant Center.";
            status.style.color = "green";
            input.value = ""; // Xóa link sau khi gán xong
          } else {
            status.innerText = "❌ Lỗi: " + (result.error || "Không xác định");
            status.style.color = "red";
          }
        } catch (error) {
          status.innerText =
            "❌ Lỗi: Server chưa chạy. Hãy mở Terminal và gõ 'node shopee-to-youtube.js'";
          status.style.color = "red";
        }
      });
    </script>
  </body>
</html>
